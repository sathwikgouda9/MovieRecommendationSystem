version: "3.9"
services:
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongo_data:/data/db"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  app:
    build: .
    ports: ["8000:8000"]
    depends_on: [mongo, redis]
    env_file: .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  stream_listener:
    build: .
    depends_on: [mongo, redis]
    env_file: .env
    command: python streams/change_listener.py

volumes:
  mongo_data:
